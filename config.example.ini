# ══════════════════════════════════════════════════════════════
# Horde Email Backup — Configuration
# ══════════════════════════════════════════════════════════════
#
# 1. Copy this file to config.ini
# 2. Fill in your credentials
# 3. Run:  python backup.py
#
# IMPORTANT: Never commit config.ini — it contains your password.

[imap]
# IMAP server hostname (check with your mail provider / Horde admin)
host = mail.example.com

# Port: 993 = IMAPS (SSL, recommended), 143 = plain IMAP or STARTTLS
port = 993

# Use SSL/TLS? Set to false only if port=143 with STARTTLS
ssl = true

# Your full email address (used as login username)
username = user@example.com

# Your email password
# Tip: if your server supports App Passwords (e.g. Gmail, Outlook)
#      generate one there instead of using your main password.
password = YOUR_PASSWORD_HERE

[backup]
# Directory where emails and the SQLite index will be stored.
# Relative paths are resolved from the directory containing backup.py.
# Use an absolute path for clarity, e.g.:
#   data_dir = C:\EmailBackup\data   (Windows)
#   data_dir = /home/user/email_data  (Linux/Mac)
data_dir = data

# How many emails to download per IMAP FETCH command.
# Reduce if you have a slow or unreliable connection.
batch_size = 25

# IMAP socket timeout in seconds.
timeout = 60

# Comma-separated list of folder names to skip.
# The special folder [Gmail]/All Mail is often a duplicate of everything else.
exclude_folders = [Gmail]/All Mail, [Gmail]/Important, [Gmail]/Starred
